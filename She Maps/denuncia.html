<!-- HEADER -->
<header class="page-header">

    <a href="mapa.html" class="page-back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5c4b83" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>

    <div>
      <div class="page-title">Registrar Denúncia</div>
      <div class="page-sub">Anônima e segura — suas informações não serão expostas</div>
    </div>
  </div>
</header>

<!-- CONTEÚDO -->
<div class="page-content">

  <!-- TIPO DE LOCAL -->
  <div class="campo">
    <div class="field-label">Tipo de Local</div>
    <div class="categorias">
      <div class="cat-btn"><span>🛣️</span> Via Pública</div>
      <div class="cat-btn"><span>🏠</span> Residência</div>
      <div class="cat-btn"><span>🎉</span> Festa / Bar</div>
      <div class="cat-btn"><span>🚌</span> Transporte</div>
      <div class="cat-btn"><span>🏢</span> Trabalho</div>
      <div class="cat-btn"><span>📍</span> Outro</div>
    </div>
  </div>

  <!-- LOCALIZAÇÃO -->
  <div class="campo">
    <div class="field-label">Localização</div>
    <input type="text" class="field-input" id="endereco-input" placeholder="Endereço do local…">
    <div class="coord-box">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M1 12h4M19 12h4"/>
      </svg>
      Nenhuma localização definida
    </div>
  </div>

  <!-- DESCRIÇÃO -->
  <div class="campo">
    <div class="field-label">O que aconteceu?</div>
    <textarea class="field-input" id="desc-input" rows="4" placeholder="Descreva brevemente o ocorrido (opcional)…"></textarea>
  </div>

</div>
