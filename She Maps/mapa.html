<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Mapa Seguro</title>
<link rel="stylesheet" href="global.css">

<body>

<div id="map"></div>

<!-- HEADER -->
<div class="header">
  <div class="title-bar">
    <div class="app-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
    </div>

  </div>
  <div class="search-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5c4b83" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search-input" placeholder="Buscar endereço ou local…" autocomplete="off">
  </div>
</div>

<!-- LEGENDA -->
<div class="legenda" id="legenda">
  <div class="legenda-titulo">Incidências</div>
  <div class="legenda-barra"></div>
  <div class="legenda-labels"><span>Menor</span><span>Maior</span></div>
</div>

<!-- ZOOM -->
<div class="zoom-ctrl">
  <div class="zoom-btn" onclick="zoomIn()">+</div>
  <div class="zoom-btn zoom-num" id="zoom-num">13</div>
  <div class="zoom-btn" onclick="zoomOut()">−</div>
</div>
